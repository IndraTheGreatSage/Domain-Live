<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Expansion | Jujutsu Kaisen</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        /* ===== KAMERA & CANVAS ===== */
        #camera-wrapper {
            position: relative;
            width: 500px;
            max-width: 92vw;
            aspect-ratio: 4 / 3;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 80px rgba(0, 100, 255, 0.08);
            z-index: 10;
        }

        #camera-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
        }

        #camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* ===== DOMAIN OVERLAY (FULL SCREEN EFFECT) ===== */
        #domain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #domain-overlay.active {
            opacity: 1;
        }

        #domain-overlay .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 20, 80, 0.92), rgba(0, 0, 0, 0.97));
            z-index: 0;
        }

        /* Efek partikel / grid khas domain */
        #domain-overlay .grid-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 150, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 3s ease-in-out infinite alternate;
        }

        @keyframes gridPulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: scale(1.4) rotate(3deg);
                opacity: 1;
            }
        }

        /* ===== TEKS DOMAIN ===== */
        #domain-name {
            position: relative;
            z-index: 2;
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 10vw, 6rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 12px;
            text-shadow: 0 0 60px currentColor, 0 0 120px currentColor;
            animation: domainTextPulse 2.5s ease-in-out infinite alternate;
            padding: 0 20px;
            line-height: 1.2;
        }

        @keyframes domainTextPulse {
            0% {
                transform: scale(1) rotate(-1deg);
                filter: blur(0px);
            }
            100% {
                transform: scale(1.06) rotate(1deg);
                filter: blur(2px);
            }
        }

        #domain-sub {
            position: relative;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.8rem, 1.8vw, 1.4rem);
            letter-spacing: 14px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 4px;
            color: #fff;
        }

        /* ===== STATUS BAR ===== */
        #status-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            transition: all 0.3s;
            max-width: 90vw;
        }

        #status-bar .highlight {
            color: #00d4ff;
            font-weight: 700;
        }

        /* ===== LIST HANDSIGN DI KAMERA ===== */
        #handsign-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            #camera-wrapper {
                width: 95vw;
                aspect-ratio: 4/3;
            }
            #status-bar {
                font-size: 0.7rem;
                padding: 10px 16px;
                bottom: 16px;
            }
            #handsign-hint {
                font-size: 0.55rem;
                padding: 4px 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== KAMERA ===== -->
    <div id="camera-wrapper">
        <video id="webcam" playsinline></video>
        <canvas id="overlay-canvas" width="640" height="480"></canvas>
        <div id="handsign-hint">✋ Tangan terdeteksi — buat handsign</div>
    </div>

    <!-- ===== DOMAIN OVERLAY (FULL SCREEN) ===== -->
    <div id="domain-overlay">
        <div class="bg"></div>
        <div class="grid-effect"></div>
        <div id="domain-name">無限 の 虚空</div>
        <div id="domain-sub">— Unlimited Void —</div>
    </div>

    <!-- ===== STATUS BAR ===== -->
    <div id="status-bar">
        <span id="status-text">⏳ Menunggu tangan...</span>
    </div>

    <script>
        // ============================================================
        // 1. KONFIGURASI DOMAIN (Handsign → Domain)
        // ============================================================
        const DOMAINS = {

            // ===== GOJO — Unlimited Void =====
            gojo: {
                name: '無限 の 虚空',
                sub: '— Unlimited Void —',
                color: '#00d4ff',
                bg: 'radial-gradient(circle at center, rgba(0,30,80,0.95), rgba(0,0,20,0.98))',
                // Ciri: telunjuk + jari tengah rapat, jari lainnya nempel ke telapak
                check: (landmarks) => {
                    // Tip: 8=telunjuk, 12=tengah, 16=manis, 20=kelingking
                    const tips = [8, 12, 16, 20];
                    const dip = [6, 10, 14, 18]; // sendi kedua
                    const mcp = [5, 9, 13, 17]; // pangkal

                    // Telunjuk & tengah lurus (tip di atas dip)
                    const idxStraight = landmarks[8].y < landmarks[6].y;
                    const midStraight = landmarks[12].y < landmarks[10].y;

                    // Manis & kelingking nempel (tip di bawah dip)
                    const ringFolded = landmarks[16].y > landmarks[14].y;
                    const pinkyFolded = landmarks[20].y > landmarks[18].y;

                    // Ibu jari (4) nempel ke telapak (cek x dekat dengan pangkal telunjuk)
                    const thumbClose = Math.abs(landmarks[4].x - landmarks[5].x) < 0.08;

                    return idxStraight && midStraight && ringFolded && pinkyFolded && thumbClose;
                }
            },

            // ===== SUKUNA — Malevolent Shrine =====
            sukuna: {
                name: '伏魔 御 廚子',
                sub: '— Malevolent Shrine —',
                color: '#ff2d55',
                bg: 'radial-gradient(circle at center, rgba(80,0,20,0.95), rgba(20,0,0,0.98))',
                // Ciri: cakar — semua jari lurus kecuali ibu jari melipat ke dalam
                check: (landmarks) => {
                    const tips = [8, 12, 16, 20];
                    const dip = [6, 10, 14, 18];

                    // Semua jari (telunjuk, tengah, manis, kelingking) lurus
                    const allStraight = tips.every((t, i) => landmarks[t].y < landmarks[dip[i]].y);

                    // Ibu jari (4) melipat ke dalam (dekat dengan telapak)
                    const thumbFolded = landmarks[4].x > landmarks[3].x + 0.02;

                    return allStraight && thumbFolded;
                }
            },

            // ===== MEGUMI — Chimera Shadow Garden =====
            megumi: {
                name: '嵌合 暗翳 庭',
                sub: '— Chimera Shadow Garden —',
                color: '#7c3aed',
                bg: 'radial-gradient(circle at center, rgba(40,0,80,0.95), rgba(10,0,20,0.98))',
                // Ciri: jari membentuk segitiga (telunjuk & tengah rapat, ibu jari menyentuh ujung jari)
                check: (landmarks) => {
                    // Telunjuk & tengah rapat (jarak tip < 0.04)
                    const idxTip = landmarks[8];
                    const midTip = landmarks[12];
                    const close = Math.hypot(idxTip.x - midTip.x, idxTip.y - midTip.y) < 0.04;

                    // Ibu jari menyentuh ujung jari tengah (jarak < 0.05)
                    const thumbTouchMid = Math.hypot(landmarks[4].x - midTip.x, landmarks[4].y - midTip.y) < 0.06;

                    // Manis & kelingking nempel ke telapak
                    const ringFolded = landmarks[16].y > landmarks[14].y;
                    const pinkyFolded = landmarks[20].y > landmarks[18].y;

                    return close && thumbTouchMid && ringFolded && pinkyFolded;
                }
            },

            // ===== DOMAIN DEFAULT (buat fallback) =====
            default: {
                name: '虚式 茈',
                sub: '— Hollow Purple —',
                color: '#ffffff',
                bg: 'radial-gradient(circle at center, rgba(20,20,40,0.95), rgba(0,0,0,0.98))',
                check: () => false
            }
        };

        // ============================================================
        // 2. STATE
        // ============================================================
        let currentDomain = null;
        let domainTimeout = null;
        let lastGesture = 'none';
        let cooldown = false;
        const COOLDOWN_MS = 2000; // 2 detik biar gak spam

        const domainOverlay = document.getElementById('domain-overlay');
        const domainNameEl = document.getElementById('domain-name');
        const domainSubEl = document.getElementById('domain-sub');
        const statusText = document.getElementById('status-text');

        // ============================================================
        // 3. FUNGSI DOMAIN
        // ============================================================
        function triggerDomain(domainKey) {
            if (cooldown) return;
            if (currentDomain === domainKey) return;

            const domain = DOMAINS[domainKey] || DOMAINS.default;
            currentDomain = domainKey;

            // Set visual overlay
            domainNameEl.textContent = domain.name;
            domainSubEl.textContent = domain.sub;
            domainNameEl.style.color = domain.color;
            domainNameEl.style.textShadow = `0 0 80px ${domain.color}, 0 0 160px ${domain.color}`;
            domainSubEl.style.color = domain.color;

            // Ubah background overlay
            const bg = domainOverlay.querySelector('.bg');
            bg.style.background = domain.bg;

            // Aktifkan overlay
            domainOverlay.classList.add('active');

            // Ubah background body sedikit
            document.body.style.background = `radial-gradient(circle at center, ${domain.color}11, #0a0a0f)`;

            // Status
            statusText.innerHTML = `🌀 <span class="highlight">${domain.name}</span> — ${domain.sub}`;

            // Cooldown
            cooldown = true;

            // Clear timeout sebelumnya
            if (domainTimeout) clearTimeout(domainTimeout);

            // Matikan overlay setelah 3 detik
            domainTimeout = setTimeout(() => {
                domainOverlay.classList.remove('active');
                document.body.style.background = '#0a0a0f';
                statusText.innerHTML = '⏳ Menunggu handsign...';
                currentDomain = null;
                cooldown = false;
                domainTimeout = null;
            }, 3000);
        }

        // ============================================================
        // 4. MEDIAPIPE — DETEKSI HANDSIGN
        // ============================================================
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('overlay-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // Fungsi cek semua handsign
        function detectHandsign(landmarks) {
            // Coba semua domain
            for (const [key, domain] of Object.entries(DOMAINS)) {
                if (key === 'default') continue;
                try {
                    if (domain.check(landmarks)) {
                        return key;
                    }
                } catch (e) {
                    // skip
                }
            }
            return null;
        }

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            // Clear canvas
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Gambar landmark tangan
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Gambar landmark
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                    color: '#00d4ff',
                    lineWidth: 2
                });
                drawLandmarks(canvasCtx, landmarks, {
                    color: '#ffffff',
                    lineWidth: 1,
                    radius: 4,
                    circleColor: 'rgba(0, 200, 255, 0.6)'
                });

                // === DETEKSI HANDSIGN ===
                const detected = detectHandsign(landmarks);
                const hint = document.getElementById('handsign-hint');

                if (detected) {
                    // Ubah hint
                    const domain = DOMAINS[detected];
                    hint.innerHTML = `🔥 ${domain.name} — ${domain.sub}`;
                    hint.style.color = domain.color;
                    hint.style.borderColor = domain.color + '44';

                    // Trigger domain (kalo beda)
                    if (detected !== lastGesture) {
                        lastGesture = detected;
                        triggerDomain(detected);
                    }
                } else {
                    hint.innerHTML = '✋ Tangan terdeteksi — buat handsign';
                    hint.style.color = 'rgba(255,255,255,0.5)';
                    hint.style.borderColor = 'rgba(255,255,255,0.05)';
                    lastGesture = 'none';
                }

                statusText.innerHTML = `👋 Tangan terdeteksi — ${results.multiHandLandmarks.length} tangan`;

            } else {
                document.getElementById('handsign-hint').innerHTML = '✋ Tidak ada tangan';
                document.getElementById('handsign-hint').style.color = 'rgba(255,255,255,0.3)';
                statusText.innerHTML = '⏳ Tidak ada tangan';
                lastGesture = 'none';
            }
        });

        // ============================================================
        // 5. KAMERA
        // ============================================================
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start();

        // ============================================================
        // 6. CATATAN: drawConnectors & drawLandmarks dari MediaPipe
        // Kita panggil langsung dari global scope MediaPipe
        // ============================================================
        // MediaPipe udah nyediain drawConnectors dan drawLandmarks global
        // Tapi kalo error, kita define manual pake fungsi simpel
        if (typeof drawConnectors === 'undefined') {
            window.drawConnectors = function(ctx, landmarks, connections, style) {
                ctx.strokeStyle = style.color || '#00d4ff';
                ctx.lineWidth = style.lineWidth || 2;
                for (const conn of connections) {
                    const start = landmarks[conn[0]];
                    const end = landmarks[conn[1]];
                    if (start && end) {
                        ctx.beginPath();
                        ctx.moveTo(start.x * ctx.canvas.width, start.y * ctx.canvas.height);
                        ctx.lineTo(end.x * ctx.canvas.width, end.y * ctx.canvas.height);
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof drawLandmarks === 'undefined') {
            window.drawLandmarks = function(ctx, landmarks, style) {
                const r = style.radius || 4;
                const color = style.color || '#ffffff';
                for (const lm of landmarks) {
                    ctx.beginPath();
                    ctx.arc(lm.x * ctx.canvas.width, lm.y * ctx.canvas.height, r, 0, 2 * Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                    if (style.circleColor) {
                        ctx.beginPath();
                        ctx.arc(lm.x * ctx.canvas.width, lm.y * ctx.canvas.height, r * 1.8, 0, 2 * Math.PI);
                        ctx.strokeStyle = style.circleColor;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof HAND_CONNECTIONS === 'undefined') {
            window.HAND_CONNECTIONS = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];
        }

        console.log('🌀 Jujutsu Kaisen — Domain Expansion Detector siap!');
        console.log('   Coba handsign:');
        console.log('   - Gojo    : telunjuk + tengah rapat, jari lain nempel');
        console.log('   - Sukuna  : semua jari lurus (cakar), ibu jari lipat');
        console.log('   - Megumi  : segitiga (telunjuk+tengah rapat, ibu jari sentuh ujung)');
    </script>
</body>
</html>
