<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Domain Expansion | Jujutsu Kaisen</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
    </script>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Biar gak ada scroll */;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            /* dikit biar gak nempel pinggir */;
        }

        /* ===== KAMERA FULL LEBAR ===== */
        #camera-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            /* biar gak kegedean di tablet */;
            aspect-ratio: 4 / 3;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.1);
            flex-shrink: 0;
            /* biar gak keciut */;
        }

        #camera-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            object-fit: cover;
        }

        #camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* ===== HANDSIGN HINT (DI BAWAH KAMERA) ===== */
        #handsign-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: clamp(0.55rem, 2.2vw, 0.8rem);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            font-weight: 600;
            transition: all 0.3s;
        }

        /* ===== STATUS BAR (DI BAWAH) ===== */
        #status-bar {
            width: 100%;
            max-width: 480px;
            margin-top: 14px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        #status-bar .highlight {
            color: #00d4ff;
            font-weight: 700;
        }

        /* ===== DOMAIN OVERLAY (FULLSCREEN) ===== */
        #domain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #domain-overlay.active {
            opacity: 1;
        }

        #domain-overlay .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 20, 80, 0.92), rgba(0, 0, 0, 0.97));
            z-index: 0;
        }

        #domain-overlay .grid-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 150, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 3s ease-in-out infinite alternate;
        }

        @keyframes gridPulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: scale(1.3) rotate(2deg);
                opacity: 1;
            }
        }

        /* ===== TEKS DOMAIN (BESAR DI HP) ===== */
        #domain-name {
            position: relative;
            z-index: 2;
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 14vw, 6rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 6px;
            text-shadow: 0 0 60px currentColor, 0 0 120px currentColor;
            animation: domainTextPulse 2.5s ease-in-out infinite alternate;
            padding: 0 16px;
            line-height: 1.2;
        }

        @keyframes domainTextPulse {
            0% {
                transform: scale(1) rotate(-1deg);
                filter: blur(0px);
            }
            100% {
                transform: scale(1.05) rotate(1deg);
                filter: blur(1px);
            }
        }

        #domain-sub {
            position: relative;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.7rem, 2.5vw, 1.2rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 4px;
            color: #fff;
            text-align: center;
            padding: 0 12px;
        }

        /* ===== RESPONSIVE BANGET BUAT HP KECIL ===== */
        @media (max-width: 480px) {
            body {
                padding: 6px;
                justify-content: center;
                gap: 6px;
            }
            #camera-wrapper {
                border-radius: 14px;
                border-width: 1px;
                box-shadow: 0 0 30px rgba(0, 100, 255, 0.05);
            }
            #status-bar {
                padding: 10px 12px;
                border-radius: 30px;
                margin-top: 8px;
            }
            #handsign-hint {
                bottom: 8px;
                padding: 4px 12px;
                font-size: 0.5rem;
                border-radius: 30px;
            }
            #domain-name {
                font-size: clamp(2.2rem, 12vw, 3.5rem);
                letter-spacing: 4px;
            }
            #domain-sub {
                font-size: 0.6rem;
                letter-spacing: 4px;
            }
        }

        /* ===== LANDSCAPE / HP MIRING ===== */
        @media (max-height: 500px) and (orientation: landscape) {
            #camera-wrapper {
                max-width: 60vh;
                aspect-ratio: 4 / 3;
            }
            #status-bar {
                font-size: 0.6rem;
                padding: 6px 14px;
                margin-top: 6px;
            }
            #domain-name {
                font-size: clamp(1.8rem, 8vh, 3rem);
            }
        }
    </style>
</head>
<body>

    <!-- ===== KAMERA ===== -->
    <div id="camera-wrapper">
        <video id="webcam" playsinline></video>
        <canvas id="overlay-canvas" width="640" height="480"></canvas>
        <div id="handsign-hint">✋ Angkat tanganmu</div>
    </div>

    <!-- ===== STATUS BAR ===== -->
    <div id="status-bar">
        <span id="status-text">⏳ Menunggu tangan...</span>
    </div>

    <!-- ===== DOMAIN OVERLAY ===== -->
    <div id="domain-overlay">
        <div class="bg"></div>
        <div class="grid-effect"></div>
        <div id="domain-name">無限 の 虚空</div>
        <div id="domain-sub">— Unlimited Void —</div>
    </div>

    <script>
        // ============================================================
        // 1. KONFIGURASI DOMAIN (Handsign → Domain)
        // ============================================================
        const DOMAINS = {

            gojo: {
                name: '無限 の 虚空',
                sub: '— Unlimited Void —',
                color: '#00d4ff',
                bg: 'radial-gradient(circle at center, rgba(0,30,80,0.95), rgba(0,0,20,0.98))',
                check: (lm) => {
                    const idxStraight = lm[8].y < lm[6].y;
                    const midStraight = lm[12].y < lm[10].y;
                    const ringFolded = lm[16].y > lm[14].y;
                    const pinkyFolded = lm[20].y > lm[18].y;
                    const thumbClose = Math.abs(lm[4].x - lm[5].x) < 0.08;
                    return idxStraight && midStraight && ringFolded && pinkyFolded && thumbClose;
                }
            },

            sukuna: {
                name: '伏魔 御 廚子',
                sub: '— Malevolent Shrine —',
                color: '#ff2d55',
                bg: 'radial-gradient(circle at center, rgba(80,0,20,0.95), rgba(20,0,0,0.98))',
                check: (lm) => {
                    const tips = [8, 12, 16, 20];
                    const dip = [6, 10, 14, 18];
                    const allStraight = tips.every((t, i) => lm[t].y < lm[dip[i]].y);
                    const thumbFolded = lm[4].x > lm[3].x + 0.02;
                    return allStraight && thumbFolded;
                }
            },

            megumi: {
                name: '嵌合 暗翳 庭',
                sub: '— Chimera Shadow Garden —',
                color: '#7c3aed',
                bg: 'radial-gradient(circle at center, rgba(40,0,80,0.95), rgba(10,0,20,0.98))',
                check: (lm) => {
                    const idx = lm[8],
                        mid = lm[12];
                    const close = Math.hypot(idx.x - mid.x, idx.y - mid.y) < 0.04;
                    const thumbTouchMid = Math.hypot(lm[4].x - mid.x, lm[4].y - mid.y) < 0.06;
                    const ringFolded = lm[16].y > lm[14].y;
                    const pinkyFolded = lm[20].y > lm[18].y;
                    return close && thumbTouchMid && ringFolded && pinkyFolded;
                }
            },

            default: {
                name: '虚式 茈',
                sub: '— Hollow Purple —',
                color: '#ffffff',
                bg: 'radial-gradient(circle at center, rgba(20,20,40,0.95), rgba(0,0,0,0.98))',
                check: () => false
            }
        };

        // ============================================================
        // 2. STATE & DOM REFS
        // ============================================================
        let currentDomain = null;
        let domainTimeout = null;
        let lastGesture = 'none';
        let cooldown = false;
        const COOLDOWN_MS = 2000;

        const overlay = document.getElementById('domain-overlay');
        const nameEl = document.getElementById('domain-name');
        const subEl = document.getElementById('domain-sub');
        const statusText = document.getElementById('status-text');
        const hintEl = document.getElementById('handsign-hint');

        function triggerDomain(key) {
            if (cooldown || currentDomain === key) return;
            const domain = DOMAINS[key] || DOMAINS.default;
            currentDomain = key;

            nameEl.textContent = domain.name;
            subEl.textContent = domain.sub;
            nameEl.style.color = domain.color;
            nameEl.style.textShadow = `0 0 80px ${domain.color}, 0 0 160px ${domain.color}`;
            subEl.style.color = domain.color;
            overlay.querySelector('.bg').style.background = domain.bg;

            overlay.classList.add('active');
            document.body.style.background = `radial-gradient(circle at center, ${domain.color}11, #0a0a0f)`;
            statusText.innerHTML = `🌀 <span class="highlight">${domain.name}</span> — ${domain.sub}`;

            cooldown = true;
            if (domainTimeout) clearTimeout(domainTimeout);
            domainTimeout = setTimeout(() => {
                overlay.classList.remove('active');
                document.body.style.background = '#0a0a0f';
                statusText.innerHTML = '⏳ Menunggu handsign...';
                currentDomain = null;
                cooldown = false;
                domainTimeout = null;
            }, 3000);
        }

        // ============================================================
        // 3. MEDIAPIPE
        // ============================================================
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');

        function detectHandsign(lm) {
            for (const [key, domain] of Object.entries(DOMAINS)) {
                if (key === 'default') continue;
                try { if (domain.check(lm)) return key; } catch (e) {}
            }
            return null;
        }

        const hands = new Hands({
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];

                drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: '#00d4ff', lineWidth: 2 });
                drawLandmarks(ctx, lm, {
                    color: '#ffffff',
                    radius: 4,
                    circleColor: 'rgba(0, 200, 255, 0.6)'
                });

                const detected = detectHandsign(lm);
                if (detected) {
                    const d = DOMAINS[detected];
                    hintEl.innerHTML = `🔥 ${d.name}`;
                    hintEl.style.color = d.color;
                    hintEl.style.borderColor = d.color + '44';
                    if (detected !== lastGesture) {
                        lastGesture = detected;
                        triggerDomain(detected);
                    }
                } else {
                    hintEl.innerHTML = '✋ Angkat tanganmu';
                    hintEl.style.color = 'rgba(255,255,255,0.5)';
                    hintEl.style.borderColor = 'rgba(255,255,255,0.05)';
                    lastGesture = 'none';
                }
                statusText.innerHTML = `👋 Tangan terdeteksi`;
            } else {
                hintEl.innerHTML = '✋ Angkat tanganmu';
                hintEl.style.color = 'rgba(255,255,255,0.3)';
                statusText.innerHTML = '⏳ Tidak ada tangan';
                lastGesture = 'none';
            }
        });

        // ============================================================
        // 4. KAMERA
        // ============================================================
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
        });
        camera.start();

        // Fallback global
        if (typeof drawConnectors === 'undefined') {
            window.drawConnectors = function(ctx, lm, conns, style) {
                ctx.strokeStyle = style.color || '#00d4ff';
                ctx.lineWidth = style.lineWidth || 2;
                for (const c of conns) {
                    const a = lm[c[0]],
                        b = lm[c[1]];
                    if (a && b) {
                        ctx.beginPath();
                        ctx.moveTo(a.x * ctx.canvas.width, a.y * ctx.canvas.height);
                        ctx.lineTo(b.x * ctx.canvas.width, b.y * ctx.canvas.height);
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof drawLandmarks === 'undefined') {
            window.drawLandmarks = function(ctx, lm, style) {
                const r = style.radius || 4;
                for (const p of lm) {
                    ctx.beginPath();
                    ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r, 0, 2 * Math.PI);
                    ctx.fillStyle = style.color || '#fff';
                    ctx.fill();
                    if (style.circleColor) {
                        ctx.beginPath();
                        ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r * 1.8, 0, 2 * Math.PI);
                        ctx.strokeStyle = style.circleColor;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof HAND_CONNECTIONS === 'undefined') {
            window.HAND_CONNECTIONS = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];
        }

        console.log('🌀 Domain Expansion Mobile Ready!');
        console.log('   Gojo   : telunjuk + tengah rapat');
        console.log('   Sukuna : cakar (semua jari lurus)');
        console.log('   Megumi : segitiga (telunjuk+tengah rapat, ibu jari sentuh)');
    </script>
</body>
</html>
