<!DOCTYPE html>
<!-- 
  ✦  Jujutsu + Face  ✦
  Versi: 2.75 (fix gepeng di Android)
-->
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>⚡ Domain + Face</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@700;900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous">
    </script>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ::-webkit-scrollbar {
            width: 6px;
            background: #0a0a12;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 720px;
            width: 100%;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            padding: 12px 0 6px;
        }
        .app-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #a855f7, #f1c40f);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 6s ease-in-out infinite alternate;
            letter-spacing: 3px;
        }
        @keyframes gradShift {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
        .app-header .sub {
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 300;
            border-top: 1px solid #1a1a2a;
            display: inline-block;
            padding-top: 6px;
        }

        /* ===== TAB ===== */
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(18, 18, 31, 0.8);
            backdrop-filter: blur(12px);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: #1a1a30;
            color: #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.08);
        }
        .tab-btn:hover {
            color: #ccc;
        }
        .tab-content {
            display: none;
            animation: fadeSlide 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================================= */
        /* DOMAIN TAB — pakai padding-bottom biar kompatibel Android */
        /* ============================================================= */
        #camera-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            /* 4:3 */
            height: 0;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 100, 255, 0.08);
            background: #000;
        }
        #camera-wrapper video,
        #camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #camera-wrapper video {
            transform: scaleX(-1);
            object-fit: cover;
        }
        #camera-wrapper canvas {
            transform: scaleX(-1);
            pointer-events: none;
            /* object-fit gak berlaku di canvas, tapi dia full 100% */
        }

        #handsign-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: clamp(0.6rem, 2vw, 0.85rem);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
            font-weight: 600;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        #status-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
        }
        #status-bar .highlight {
            color: #00d4ff;
            font-weight: 700;
        }

        /* ===== DOMAIN OVERLAY ===== */
        #domain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #domain-overlay.active {
            opacity: 1;
        }
        #domain-overlay .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 20, 80, 0.92), rgba(0, 0, 0, 0.97));
            z-index: 0;
        }
        #domain-overlay .grid-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: linear-gradient(rgba(0, 150, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 4s ease-in-out infinite alternate;
        }
        @keyframes gridPulse {
            0% {
                transform: scale(1) rotate(-2deg);
                opacity: 0.3;
            }
            100% {
                transform: scale(1.4) rotate(3deg);
                opacity: 0.9;
            }
        }
        #domain-name {
            position: relative;
            z-index: 2;
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif;
            font-size: clamp(3rem, 16vw, 7rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 8px;
            text-shadow: 0 0 80px currentColor, 0 0 160px currentColor;
            animation: domainPulse 2.5s ease-in-out infinite alternate;
            padding: 0 16px;
            line-height: 1.2;
        }
        @keyframes domainPulse {
            0% {
                transform: scale(1) rotate(-1deg);
                filter: blur(0px);
            }
            100% {
                transform: scale(1.06) rotate(1.5deg);
                filter: blur(2px);
            }
        }
        #domain-sub {
            position: relative;
            z-index: 2;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.7rem, 2.5vw, 1.3rem);
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 6px;
            color: #fff;
            text-align: center;
            padding: 0 12px;
        }

        /* ============================================================= */
        /* FACE CHECK TAB — padding-bottom biar proporsional di Android */
        /* ============================================================= */
        .face-container {
            background: rgba(18, 18, 31, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .face-container h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            color: #f1c40f;
            letter-spacing: 2px;
        }
        .face-container .sub {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        #face-camera-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            /* 4:3 */
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.04);
            background: #000;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }
        #face-camera-wrapper video,
        #face-camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        #face-camera-wrapper video {
            transform: scaleX(-1);
            object-fit: cover;
        }
        #face-camera-wrapper canvas {
            transform: scaleX(-1);
            pointer-events: none;
        }

        #brightness-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 5;
            border-radius: 16px;
        }
        #brightness-overlay.active {
            opacity: 0.5;
        }

        .face-controls {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .face-controls .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            background: #1a1a30;
            color: #ccc;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            font-family: 'Inter', sans-serif;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .face-controls .btn:hover {
            transform: scale(1.04) translateY(-2px);
        }
        .face-controls .btn-primary {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #0a0a12;
        }
        .face-controls .btn-primary:hover {
            box-shadow: 0 8px 30px rgba(241, 196, 15, 0.25);
        }
        .face-controls .btn-primary.active {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        .face-controls .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        .face-controls .btn-secondary:hover {
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.25);
        }
        .face-controls .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        #face-status {
            margin-top: 14px;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            font-family: 'JetBrains Mono', monospace;
        }

        #face-result {
            margin-top: 18px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(13, 13, 26, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
            display: none;
        }
        #face-result.show {
            display: block;
            animation: fadeSlide 0.5s ease;
        }
        #face-result .rank {
            font-size: 3rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }
        #face-result .desc {
            margin-top: 8px;
            font-size: 1rem;
            color: #aaa;
        }
        #face-result .score {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }
        #face-result .detail {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #555;
            line-height: 1.8;
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 0 4px;
            }
            .app-header h1 {
                font-size: 1.2rem;
            }
            .tab-btn {
                font-size: 0.65rem;
                padding: 7px 0;
            }
            .face-container {
                padding: 12px;
            }
            #face-result .rank {
                font-size: 2.2rem;
            }
            .face-controls .btn {
                font-size: 0.7rem;
                padding: 8px 12px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <header class="app-header">
            <h1>⚡ Jujutsu + Face</h1>
            <span class="sub">domain · rating · chaos</span>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tab-domain">🌀 Domain</button>
            <button class="tab-btn" data-tab="tab-face">👁️ Face Check</button>
        </div>

        <!-- ===== TAB DOMAIN ===== -->
        <div id="tab-domain" class="tab-content active">
            <div id="camera-wrapper">
                <video id="webcam" playsinline></video>
                <canvas id="overlay-canvas" width="640" height="480"></canvas>
                <div id="handsign-hint">✋ angkat tangan</div>
            </div>
            <div id="status-bar">
                <span id="status-text">⏳ tunggu tangan...</span>
            </div>
        </div>

        <!-- ===== TAB FACE ===== -->
        <div id="tab-face" class="tab-content">
            <div class="face-container">
                <h2>👁️ Face Rating</h2>
                <p class="sub">deteksi wajah · analisis proporsi</p>

                <div id="face-camera-wrapper">
                    <video id="face-video" playsinline></video>
                    <canvas id="face-canvas" width="640" height="480"></canvas>
                    <div id="brightness-overlay"></div>
                </div>

                <div class="face-controls">
                    <button class="btn btn-secondary" id="switchCamBtn">🔄 Ganti Kamera</button>
                    <button class="btn btn-primary" id="brightnessBtn">💡 Terangin Layar</button>
                    <button class="btn btn-primary" id="flashlightBtn">🔦 Senter</button>
                </div>

                <div id="face-status">⏳ tunggu wajah...</div>

                <div id="face-result">
                    <div class="rank" id="faceRank">—</div>
                    <div class="desc" id="faceDesc"></div>
                    <div class="score" id="faceScore"></div>
                    <div class="detail" id="faceDetail"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- ===== DOMAIN OVERLAY ===== -->
    <div id="domain-overlay">
        <div class="bg"></div>
        <div class="grid-effect"></div>
        <div id="domain-name">無限 の 虚空</div>
        <div id="domain-sub">— Unlimited Void —</div>
    </div>

    <script>
        // ================================================================
        //  🤘 Fix gepeng di Android — pake padding-bottom 75%
        // ================================================================

        // ========== 1. TAB & KAMERA ==========
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabDomain = document.getElementById('tab-domain');
        const tabFace = document.getElementById('tab-face');

        let domainCamera = null,
            faceCamera = null;
        let domainRunning = false,
            faceRunning = false;

        let facingMode = 'user';
        let flashlightActive = false;
        let flashlightTrack = null;
        let brightnessActive = false;

        function stopDomainCamera() {
            if (domainCamera) { try { domainCamera.stop(); } catch (e) {} }
            domainRunning = false;
            domainCamera = null;
            const v = document.getElementById('webcam');
            if (v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop());
                v.srcObject = null; }
        }

        function stopFaceCamera() {
            if (faceCamera) { try { faceCamera.stop(); } catch (e) {} }
            faceRunning = false;
            faceCamera = null;
            const v = document.getElementById('face-video');
            if (v && v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop());
                v.srcObject = null; }
            if (flashlightActive) toggleFlashlight();
        }

        // ========== 2. SENTER ==========
        function toggleFlashlight() {
            const btn = document.getElementById('flashlightBtn');
            const vid = document.getElementById('face-video');
            if (!vid || !vid.srcObject) { alert('Kamera belum nyala!'); return; }
            const tracks = vid.srcObject.getTracks();
            for (const t of tracks) {
                if (t.kind === 'video') { flashlightTrack = t; break; }
            }
            if (!flashlightTrack) { alert('❌ Senter tidak didukung. Pakai "Terangin Layar".'); return; }
            const cap = flashlightTrack.getCapabilities ? flashlightTrack.getCapabilities() : {};
            if (!cap.torch) { alert('❌ Senter tidak didukung. Pakai "Terangin Layar".'); return; }
            flashlightActive = !flashlightActive;
            flashlightTrack.applyConstraints({ advanced: [{ torch: flashlightActive }] }).catch(e => {
                alert('Gagal nyalakan senter: ' + e.message);
                flashlightActive = false;
            });
            btn.textContent = flashlightActive ? '🔦 Senter ON' : '🔦 Senter';
            btn.classList.toggle('active', flashlightActive);
        }

        // ========== 3. BRIGHTNESS ==========
        function toggleBrightness() {
            const overlay = document.getElementById('brightness-overlay');
            const btn = document.getElementById('brightnessBtn');
            brightnessActive = !brightnessActive;
            overlay.classList.toggle('active', brightnessActive);
            btn.textContent = brightnessActive ? '💡 Terang ON' : '💡 Terangin Layar';
            btn.classList.toggle('active', brightnessActive);
        }

        // ========== 4. SWITCH KAMERA ==========
        function switchCamera() {
            facingMode = (facingMode === 'user') ? 'environment' : 'user';
            const btn = document.getElementById('switchCamBtn');
            btn.textContent = (facingMode === 'user') ? '🔄 Depan' : '🔄 Belakang';
            if (faceRunning) {
                stopFaceCamera();
                startFaceCamera();
            } else {
                startFaceCamera();
            }
        }

        // ========== 5. DOMAIN ==========
        const DOMAINS = {
            gojo: {
                name: '無限 の 虚空',
                sub: '— Unlimited Void —',
                color: '#00d4ff',
                bg: 'radial-gradient(circle at center, rgba(0,30,80,0.95), rgba(0,0,20,0.98))',
                check: (lm) => {
                    const a = lm[8].y < lm[6].y,
                        b = lm[12].y < lm[10].y;
                    const c = lm[16].y > lm[14].y,
                        d = lm[20].y > lm[18].y;
                    const e = Math.abs(lm[4].x - lm[5].x) < 0.08;
                    return a && b && c && d && e;
                }
            },
            sukuna: {
                name: '伏魔 御 廚子',
                sub: '— Malevolent Shrine —',
                color: '#ff2d55',
                bg: 'radial-gradient(circle at center, rgba(80,0,20,0.95), rgba(20,0,0,0.98))',
                check: (lm) => {
                    const tips = [8, 12, 16, 20],
                        dip = [6, 10, 14, 18];
                    const allStraight = tips.every((t, i) => lm[t].y < lm[dip[i]].y);
                    const thumbFolded = lm[4].x > lm[3].x + 0.02;
                    return allStraight && thumbFolded;
                }
            },
            megumi: {
                name: '嵌合 暗翳 庭',
                sub: '— Chimera Shadow Garden —',
                color: '#7c3aed',
                bg: 'radial-gradient(circle at center, rgba(40,0,80,0.95), rgba(10,0,20,0.98))',
                check: (lm) => {
                    const i = lm[8],
                        m = lm[12];
                    const close = Math.hypot(i.x - m.x, i.y - m.y) < 0.04;
                    const thumb = Math.hypot(lm[4].x - m.x, lm[4].y - m.y) < 0.06;
                    const r = lm[16].y > lm[14].y,
                        p = lm[20].y > lm[18].y;
                    return close && thumb && r && p;
                }
            },
            default: {
                name: '虚式 茈',
                sub: '— Hollow Purple —',
                color: '#ffffff',
                bg: 'radial-gradient(circle at center, rgba(20,20,40,0.95), rgba(0,0,0,0.98))',
                check: () => false
            }
        };

        let currentDomain = null,
            domainTimer = null,
            lastGesture = 'none',
            cooldown = false;
        const CD = 2000;

        const overlayDom = document.getElementById('domain-overlay');
        const nameEl = document.getElementById('domain-name');
        const subEl = document.getElementById('domain-sub');
        const statusText = document.getElementById('status-text');
        const hintEl = document.getElementById('handsign-hint');

        function triggerDomain(key) {
            if (cooldown || currentDomain === key) return;
            const d = DOMAINS[key] || DOMAINS.default;
            currentDomain = key;
            nameEl.textContent = d.name;
            subEl.textContent = d.sub;
            nameEl.style.color = d.color;
            nameEl.style.textShadow = `0 0 80px ${d.color}, 0 0 160px ${d.color}`;
            subEl.style.color = d.color;
            overlayDom.querySelector('.bg').style.background = d.bg;
            overlayDom.classList.add('active');
            document.body.style.background = `radial-gradient(circle at center, ${d.color}11, #0a0a12)`;
            statusText.innerHTML = `🌀 <span class="highlight">${d.name}</span> — ${d.sub}`;
            cooldown = true;
            if (domainTimer) clearTimeout(domainTimer);
            domainTimer = setTimeout(() => {
                overlayDom.classList.remove('active');
                document.body.style.background = '#0a0a12';
                statusText.innerHTML = '⏳ tunggu tangan...';
                currentDomain = null;
                cooldown = false;
                domainTimer = null;
            }, 3000);
        }

        const domVideo = document.getElementById('webcam');
        const domCanvas = document.getElementById('overlay-canvas');
        const domCtx = domCanvas.getContext('2d');

        function detectHandsign(lm) {
            for (const [k, d] of Object.entries(DOMAINS)) {
                if (k === 'default') continue;
                try { if (d.check(lm)) return k; } catch (e) {}
            }
            return null;
        }

        let handsInst = null;

        function initHands() {
            if (handsInst) return;
            handsInst = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            handsInst.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6 });
            handsInst.onResults((res) => {
                domCtx.clearRect(0, 0, domCanvas.width, domCanvas.height);
                if (res.multiHandLandmarks && res.multiHandLandmarks.length) {
                    const lm = res.multiHandLandmarks[0];
                    drawConnectors(domCtx, lm, HAND_CONNECTIONS, { color: '#00d4ff', lineWidth: 2 });
                    drawLandmarks(domCtx, lm, { color: '#ffffff', radius: 4, circleColor: 'rgba(0, 200, 255, 0.6)' });
                    const detected = detectHandsign(lm);
                    if (detected) {
                        const d = DOMAINS[detected];
                        hintEl.innerHTML = `🔥 ${d.name}`;
                        hintEl.style.color = d.color;
                        hintEl.style.borderColor = d.color + '44';
                        if (detected !== lastGesture) { lastGesture = detected;
                            triggerDomain(detected); }
                    } else {
                        hintEl.innerHTML = '✋ angkat tangan';
                        hintEl.style.color = 'rgba(255,255,255,0.5)';
                        hintEl.style.borderColor = 'rgba(255,255,255,0.05)';
                        lastGesture = 'none';
                    }
                    statusText.innerHTML = `👋 tangan detected`;
                } else {
                    hintEl.innerHTML = '✋ angkat tangan';
                    hintEl.style.color = 'rgba(255,255,255,0.3)';
                    statusText.innerHTML = '⏳ nggak ada tangan';
                    lastGesture = 'none';
                }
            });
        }

        function startDomainCamera() {
            if (domainRunning) return;
            stopFaceCamera();
            initHands();
            if (!domainCamera) {
                domainCamera = new Camera(domVideo, {
                    onFrame: async () => { await handsInst.send({ image: domVideo }); },
                    width: 640,
                    height: 480
                });
            }
            domainCamera.start();
            domainRunning = true;
        }

        function stopDomainCamera() {
            if (domainCamera) { try { domainCamera.stop(); } catch (e) {} }
            domainRunning = false;
            domainCamera = null;
            if (domVideo && domVideo.srcObject) {
                domVideo.srcObject.getTracks().forEach(t => t.stop());
                domVideo.srcObject = null;
            }
        }

        // ========== 6. FACE CHECK ==========
        let faceMeshInst = null,
            faceCamInst = null,
            faceInit = false;

        const rankMap = [
            { min: 0, max: 20, label: 'Subhuman', emoji: '🧟', desc: 'Banyak yang perlu dibenerin.' },
            { min: 21, max: 40, label: 'Normie', emoji: '😐', desc: 'Standar. Nggak jelek.' },
            { min: 41, max: 60, label: 'Chadlite', emoji: '💪', desc: 'Di atas rata-rata!' },
            { min: 61, max: 80, label: 'Chad', emoji: '🔥', desc: 'Wajah tegas, simetris.' },
            { min: 81, max: 100, label: 'True Adam', emoji: '👑', desc: 'Puncak! Hampir sempurna.' }
        ];

        const fVideo = document.getElementById('face-video');
        const fCanvas = document.getElementById('face-canvas');
        const fCtx = fCanvas.getContext('2d');
        const fStatus = document.getElementById('face-status');
        const fResult = document.getElementById('face-result');
        const fRank = document.getElementById('faceRank');
        const fDesc = document.getElementById('faceDesc');
        const fScore = document.getElementById('faceScore');
        const fDetail = document.getElementById('faceDetail');

        function analyzeFace(lm) {
            function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

            function distY(a, b) { return Math.abs(a.y - b.y); }

            const fw = dist(lm[234], lm[454]),
                fh = dist(lm[10], lm[152]);
            const rWH = fw / fh;
            const eyeD = dist(lm[33], lm[263]);
            const eyeR = eyeD / fw;
            const midX = (lm[234].x + lm[454].x) / 2;
            const jawAsym = Math.abs((lm[199].x - midX) - (midX - lm[419].x)) / fw;
            const chinH = distY(lm[152], lm[14]);
            const lowerR = chinH / fh;

            let score = 50;
            if (rWH > 0.7 && rWH < 0.8) score += 15;
            else if (rWH > 0.65 && rWH < 0.85) score += 8;
            else score -= 10;

            if (eyeR > 0.42 && eyeR < 0.52) score += 15;
            else if (eyeR > 0.38 && eyeR < 0.56) score += 8;
            else score -= 10;

            if (jawAsym < 0.03) score += 15;
            else if (jawAsym < 0.06) score += 8;
            else score -= 10;

            if (lowerR > 0.40 && lowerR < 0.58) score += 10;
            else if (lowerR > 0.35 && lowerR < 0.62) score += 5;
            else score -= 8;

            const e2n = distY(lm[1], lm[33]) / fh;
            if (e2n > 0.28 && e2n < 0.42) score += 10;
            else if (e2n > 0.24 && e2n < 0.46) score += 5;
            else score -= 6;

            score = Math.max(0, Math.min(100, score));
            let rank = rankMap.find(r => score >= r.min && score <= r.max) || rankMap[0];
            const detail =
                `Rasio W/H: ${rWH.toFixed(2)} (ideal 0.72-0.78)<br>Jarak Mata: ${eyeR.toFixed(2)} (ideal 0.44-0.50)<br>Simetri Rahang: ${(jawAsym*100).toFixed(1)}%<br>Proporsi Bawah: ${lowerR.toFixed(2)} (ideal 0.45-0.55)`;
            return { score, rank, detail };
        }

        function initFaceDetection() {
            if (faceInit) return;
            faceInit = true;
            faceMeshInst = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
            faceMeshInst.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6 });
            faceMeshInst.onResults((res) => {
                fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
                if (res.multiFaceLandmarks && res.multiFaceLandmarks.length) {
                    const lm = res.multiFaceLandmarks[0];
                    for (const p of lm) {
                        const x = p.x * fCanvas.width,
                            y = p.y * fCanvas.height;
                        fCtx.beginPath();
                        fCtx.arc(x, y, 2, 0, 2 * Math.PI);
                        fCtx.fillStyle = 'rgba(0,200,255,0.6)';
                        fCtx.fill();
                    }
                    const result = analyzeFace(lm);
                    const rank = result.rank,
                        score = result.score;
                    fResult.classList.add('show');
                    fRank.textContent = `${rank.emoji} ${rank.label}`;
                    fRank.style.color = score >= 80 ? '#f1c40f' : score >= 60 ? '#e67e22' : score >= 40 ? '#3498db' :
                        score >= 20 ? '#95a5a6' : '#e74c3c';
                    fDesc.textContent = rank.desc;
                    fScore.textContent = `Skor: ${Math.round(score)} / 100`;
                    fDetail.innerHTML = result.detail;
                    fStatus.textContent = '✅ wajah detected';
                } else {
                    fResult.classList.remove('show');
                    fStatus.textContent = '⏳ nggak ada wajah';
                }
            });
        }

        function startFaceCamera() {
            if (faceRunning) return;
            stopDomainCamera();
            initFaceDetection();

            const constraints = {
                audio: false,
                video: {
                    facingMode: facingMode,
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            navigator.mediaDevices.getUserMedia(constraints).then(stream => {
                fVideo.srcObject = stream;
                fVideo.play();
                if (faceCamInst) {
                    try { faceCamInst.stop(); } catch (e) {}
                }
                faceCamInst = new Camera(fVideo, {
                    onFrame: async () => {
                        await faceMeshInst.send({ image: fVideo });
                    },
                    width: 640,
                    height: 480
                });
                faceCamInst.start();
                faceRunning = true;
                const btn = document.getElementById('switchCamBtn');
                btn.textContent = (facingMode === 'user') ? '🔄 Depan' : '🔄 Belakang';
            }).catch(err => {
                alert('Gagal akses kamera: ' + err.message);
                faceRunning = false;
            });
        }

        function stopFaceCamera() {
            if (faceCamInst) {
                try { faceCamInst.stop(); } catch (e) {}
            }
            faceRunning = false;
            faceCamInst = null;
            if (fVideo && fVideo.srcObject) {
                fVideo.srcObject.getTracks().forEach(t => t.stop());
                fVideo.srcObject = null;
            }
            if (flashlightActive) toggleFlashlight();
        }

        // ========== 7. EVENT ==========
        document.getElementById('flashlightBtn').addEventListener('click', toggleFlashlight);
        document.getElementById('brightnessBtn').addEventListener('click', toggleBrightness);
        document.getElementById('switchCamBtn').addEventListener('click', switchCamera);

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const t = btn.dataset.tab;
                if (t === 'tab-domain') {
                    tabDomain.classList.add('active');
                    tabFace.classList.remove('active');
                    stopFaceCamera();
                    startDomainCamera();
                    if (brightnessActive) toggleBrightness();
                } else if (t === 'tab-face') {
                    tabFace.classList.add('active');
                    tabDomain.classList.remove('active');
                    stopDomainCamera();
                    startFaceCamera();
                }
            });
        });

        // ========== 8. FALLBACK DRAW ==========
        if (typeof drawConnectors === 'undefined') {
            window.drawConnectors = function(ctx, lm, conns, style) {
                ctx.strokeStyle = style.color || '#00d4ff';
                ctx.lineWidth = style.lineWidth || 2;
                for (const c of conns) {
                    const a = lm[c[0]],
                        b = lm[c[1]];
                    if (a && b) {
                        ctx.beginPath();
                        ctx.moveTo(a.x * ctx.canvas.width, a.y * ctx.canvas.height);
                        ctx.lineTo(b.x * ctx.canvas.width, b.y * ctx.canvas.height);
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof drawLandmarks === 'undefined') {
            window.drawLandmarks = function(ctx, lm, style) {
                const r = style.radius || 4;
                for (const p of lm) {
                    ctx.beginPath();
                    ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r, 0, 2 * Math.PI);
                    ctx.fillStyle = style.color || '#fff';
                    ctx.fill();
                    if (style.circleColor) {
                        ctx.beginPath();
                        ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r * 1.8, 0, 2 * Math.PI);
                        ctx.strokeStyle = style.circleColor;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof HAND_CONNECTIONS === 'undefined') {
            window.HAND_CONNECTIONS = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];
        }

        // ========== 9. START ==========
        startDomainCamera();

        console.log('🔥 Fix gepeng di Android!');
        console.log('   Padding-bottom 75% biar 4:3.');
        console.log('   Canvas & video full 100% tanpa stretch.');
        console.log('   Kalo masih gepeng, kasih tahu.');
    </script>
</body>
</html>
