<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Domain + Face Check</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
    </script>

    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous">
    </script>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: #0a0a12;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px 12px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .app-header {
            text-align: center;
            padding: 10px 0 4px;
        }
        .app-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .app-header p {
            font-size: 0.8rem;
            color: #666;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: #12121f;
            padding: 6px;
            border-radius: 60px;
            border: 1px solid #1e1e32;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: #1a1a30;
            color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.08);
        }
        .tab-btn:hover {
            color: #fff;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================= */
        /* TAB 1 — DOMAIN */
        /* ============================================================= */
        #camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.06);
            background: #000;
        }
        #camera-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            object-fit: cover;
        }
        #camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #handsign-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: clamp(0.55rem, 2.2vw, 0.8rem);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            font-weight: 600;
            transition: all 0.3s;
            pointer-events: none;
        }
        #status-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-top: 10px;
        }
        #status-bar .highlight {
            color: #00d4ff;
            font-weight: 700;
        }

        #domain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #domain-overlay.active {
            opacity: 1;
        }
        #domain-overlay .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 20, 80, 0.92), rgba(0, 0, 0, 0.97));
            z-index: 0;
        }
        #domain-overlay .grid-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: linear-gradient(rgba(0, 150, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 3s ease-in-out infinite alternate;
        }
        @keyframes gridPulse {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: scale(1.3) rotate(2deg);
                opacity: 1;
            }
        }
        #domain-name {
            position: relative;
            z-index: 2;
            font-family: 'Noto Sans JP', 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 14vw, 6rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 6px;
            text-shadow: 0 0 60px currentColor, 0 0 120px currentColor;
            animation: domainTextPulse 2.5s ease-in-out infinite alternate;
            padding: 0 16px;
            line-height: 1.2;
        }
        @keyframes domainTextPulse {
            0% {
                transform: scale(1) rotate(-1deg);
                filter: blur(0px);
            }
            100% {
                transform: scale(1.05) rotate(1deg);
                filter: blur(1px);
            }
        }
        #domain-sub {
            position: relative;
            z-index: 2;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.7rem, 2.5vw, 1.2rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 4px;
            color: #fff;
            text-align: center;
            padding: 0 12px;
        }

        /* ============================================================= */
        /* TAB 2 — FACE CHECK */
        /* ============================================================= */
        .face-container {
            background: #12121f;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1e1e32;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }
        .face-container h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
            color: #f1c40f;
        }
        .face-container .sub {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        #face-camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: #000;
        }
        #face-camera-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
            object-fit: cover;
        }
        #face-camera-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #face-status {
            margin-top: 12px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
        #face-result {
            margin-top: 16px;
            padding: 16px;
            border-radius: 16px;
            background: #0d0d1a;
            border: 1px solid #1e1e32;
            text-align: center;
            display: none;
        }
        #face-result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        #face-result .rank {
            font-size: 2.8rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }
        #face-result .desc {
            margin-top: 6px;
            font-size: 1rem;
            color: #aaa;
        }
        #face-result .score {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #666;
        }
        #face-result .detail {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #555;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 10px 8px 20px;
            }
            .app-header h1 {
                font-size: 1.3rem;
            }
            .tab-btn {
                font-size: 0.7rem;
                padding: 8px 0;
            }
            .face-container {
                padding: 12px;
            }
            #face-result .rank {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="app-header">
            <h1>⚡ Jujutsu + Face</h1>
            <p>Domain Expansion · Face Rating</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tab-domain">🌀 Domain</button>
            <button class="tab-btn" data-tab="tab-face">👁️ Face Check</button>
        </div>

        <!-- TAB DOMAIN -->
        <div id="tab-domain" class="tab-content active">
            <div id="camera-wrapper">
                <video id="webcam" playsinline></video>
                <canvas id="overlay-canvas" width="640" height="480"></canvas>
                <div id="handsign-hint">✋ Angkat tanganmu</div>
            </div>
            <div id="status-bar">
                <span id="status-text">⏳ Menunggu tangan...</span>
            </div>
        </div>

        <!-- TAB FACE -->
        <div id="tab-face" class="tab-content">
            <div class="face-container">
                <h2>👁️ Face Rating</h2>
                <p class="sub">Deteksi wajah — analisis rahang, mata, proporsi</p>
                <div id="face-camera-wrapper">
                    <video id="face-video" playsinline></video>
                    <canvas id="face-canvas" width="640" height="480"></canvas>
                </div>
                <div id="face-status">⏳ Menunggu wajah...</div>
                <div id="face-result">
                    <div class="rank" id="faceRank">—</div>
                    <div class="desc" id="faceDesc"></div>
                    <div class="score" id="faceScore"></div>
                    <div class="detail" id="faceDetail"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- DOMAIN OVERLAY -->
    <div id="domain-overlay">
        <div class="bg"></div>
        <div class="grid-effect"></div>
        <div id="domain-name">無限 の 虚空</div>
        <div id="domain-sub">— Unlimited Void —</div>
    </div>

    <script>
        // ================================================================
        // 1. TAB NAVIGASI + MANAJEMEN KAMERA
        // ================================================================
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabDomain = document.getElementById('tab-domain');
        const tabFace = document.getElementById('tab-face');

        // Referensi kamera
        let domainCamera = null;
        let faceCamera = null;
        let domainRunning = false;
        let faceRunning = false;

        // Fungsi stop kamera domain
        function stopDomainCamera() {
            if (domainCamera) {
                try { domainCamera.stop(); } catch (e) {}
                domainRunning = false;
                domainCamera = null;
            }
            // Hentikan video agar mati
            const vid = document.getElementById('webcam');
            if (vid && vid.srcObject) {
                vid.srcObject.getTracks().forEach(t => t.stop());
                vid.srcObject = null;
            }
        }

        // Fungsi start kamera domain
        function startDomainCamera() {
            if (domainRunning) return;
            // Pastikan face camera di-stop dulu
            stopFaceCamera();

            const vid = document.getElementById('webcam');
            const canvas = document.getElementById('overlay-canvas');
            const ctx = canvas.getContext('2d');

            // Inisialisasi MediaPipe Hands (sudah ada di global)
            // Kita panggil ulang, tapi karena hands sudah diinisialisasi di bawah, kita cukup start camera
            // Kita buat instance baru untuk menghindari konflik
            // Tapi karena kita sudah punya hands global, kita re-use
            // Namun kita harus memastikan hands.onResults masih terikat
            // Kita akan mengikat ulang di sini
            // Lebih praktis: kita panggil fungsi startDomainCameraInternal
            startDomainCameraInternal();
        }

        // Fungsi internal untuk start domain
        function startDomainCameraInternal() {
            if (domainRunning) return;
            // Kita pake fungsi dari kode di bawah, kita re-use
            // Tapi karena kode di bawah langsung jalan, kita perlu menonaktifkan auto-start
            // Kami akan menangani di bagian inisialisasi.
            // Untuk sekarang, kita panggil fungsi yang sudah didefinisikan di bawah.
            // Karena kita akan tulis ulang, kita buat fungsi di sini.
            // Lebih baik kita pindahkan semua inisialisasi ke fungsi inisialisasi yang bisa dipanggil.
            // Tapi karena kode di bawah sudah panjang, kita akan menggunakan pendekatan: saat tab switch, kita panggil fungsi yang sesuai.
            // Kita akan buat variabel global untuk hands dan camera.
            // Kita akan definisikan di bawah.
            // Untuk memudahkan, kita akan tulis ulang bagian inisialisasi dengan fungsi yang jelas.
            // Lihat bagian akhir script.
        }

        // Fungsi stop face camera
        function stopFaceCamera() {
            if (faceCamera) {
                try { faceCamera.stop(); } catch (e) {}
                faceRunning = false;
                faceCamera = null;
            }
            const vid = document.getElementById('face-video');
            if (vid && vid.srcObject) {
                vid.srcObject.getTracks().forEach(t => t.stop());
                vid.srcObject = null;
            }
        }

        // Fungsi start face camera
        function startFaceCamera() {
            if (faceRunning) return;
            stopDomainCamera();
            // Inisialisasi face camera (didefinisikan di bawah)
            initFaceDetection();
        }

        // Tab switching
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const target = btn.dataset.tab;

                if (target === 'tab-domain') {
                    tabDomain.classList.add('active');
                    tabFace.classList.remove('active');
                    // Start domain, stop face
                    stopFaceCamera();
                    startDomainCamera();
                } else if (target === 'tab-face') {
                    tabFace.classList.add('active');
                    tabDomain.classList.remove('active');
                    // Start face, stop domain
                    stopDomainCamera();
                    startFaceCamera();
                }
            });
        });

        // ================================================================
        // 2. DOMAIN EXPANSION (dengan fungsi start/stop)
        // ================================================================
        const DOMAINS = {
            gojo: {
                name: '無限 の 虚空',
                sub: '— Unlimited Void —',
                color: '#00d4ff',
                bg: 'radial-gradient(circle at center, rgba(0,30,80,0.95), rgba(0,0,20,0.98))',
                check: (lm) => {
                    const idxStraight = lm[8].y < lm[6].y;
                    const midStraight = lm[12].y < lm[10].y;
                    const ringFolded = lm[16].y > lm[14].y;
                    const pinkyFolded = lm[20].y > lm[18].y;
                    const thumbClose = Math.abs(lm[4].x - lm[5].x) < 0.08;
                    return idxStraight && midStraight && ringFolded && pinkyFolded && thumbClose;
                }
            },
            sukuna: {
                name: '伏魔 御 廚子',
                sub: '— Malevolent Shrine —',
                color: '#ff2d55',
                bg: 'radial-gradient(circle at center, rgba(80,0,20,0.95), rgba(20,0,0,0.98))',
                check: (lm) => {
                    const tips = [8, 12, 16, 20];
                    const dip = [6, 10, 14, 18];
                    const allStraight = tips.every((t, i) => lm[t].y < lm[dip[i]].y);
                    const thumbFolded = lm[4].x > lm[3].x + 0.02;
                    return allStraight && thumbFolded;
                }
            },
            megumi: {
                name: '嵌合 暗翳 庭',
                sub: '— Chimera Shadow Garden —',
                color: '#7c3aed',
                bg: 'radial-gradient(circle at center, rgba(40,0,80,0.95), rgba(10,0,20,0.98))',
                check: (lm) => {
                    const idx = lm[8],
                        mid = lm[12];
                    const close = Math.hypot(idx.x - mid.x, idx.y - mid.y) < 0.04;
                    const thumbTouchMid = Math.hypot(lm[4].x - mid.x, lm[4].y - mid.y) < 0.06;
                    const ringFolded = lm[16].y > lm[14].y;
                    const pinkyFolded = lm[20].y > lm[18].y;
                    return close && thumbTouchMid && ringFolded && pinkyFolded;
                }
            },
            default: {
                name: '虚式 茈',
                sub: '— Hollow Purple —',
                color: '#ffffff',
                bg: 'radial-gradient(circle at center, rgba(20,20,40,0.95), rgba(0,0,0,0.98))',
                check: () => false
            }
        };

        let currentDomain = null,
            domainTimeout = null,
            lastGesture = 'none',
            cooldown = false;
        const COOLDOWN_MS = 2000;

        const overlay = document.getElementById('domain-overlay');
        const nameEl = document.getElementById('domain-name');
        const subEl = document.getElementById('domain-sub');
        const statusText = document.getElementById('status-text');
        const hintEl = document.getElementById('handsign-hint');

        function triggerDomain(key) {
            if (cooldown || currentDomain === key) return;
            const domain = DOMAINS[key] || DOMAINS.default;
            currentDomain = key;
            nameEl.textContent = domain.name;
            subEl.textContent = domain.sub;
            nameEl.style.color = domain.color;
            nameEl.style.textShadow = `0 0 80px ${domain.color}, 0 0 160px ${domain.color}`;
            subEl.style.color = domain.color;
            overlay.querySelector('.bg').style.background = domain.bg;
            overlay.classList.add('active');
            document.body.style.background = `radial-gradient(circle at center, ${domain.color}11, #0a0a12)`;
            statusText.innerHTML = `🌀 <span class="highlight">${domain.name}</span> — ${domain.sub}`;
            cooldown = true;
            if (domainTimeout) clearTimeout(domainTimeout);
            domainTimeout = setTimeout(() => {
                overlay.classList.remove('active');
                document.body.style.background = '#0a0a12';
                statusText.innerHTML = '⏳ Menunggu handsign...';
                currentDomain = null;
                cooldown = false;
                domainTimeout = null;
            }, 3000);
        }

        // MediaPipe Hands setup
        const domainVideo = document.getElementById('webcam');
        const domainCanvas = document.getElementById('overlay-canvas');
        const domainCtx = domainCanvas.getContext('2d');

        function detectHandsign(lm) {
            for (const [key, domain] of Object.entries(DOMAINS)) {
                if (key === 'default') continue;
                try { if (domain.check(lm)) return key; } catch (e) {}
            }
            return null;
        }

        // Buat hands instance
        let handsInstance = null;

        function initHands() {
            if (handsInstance) return;
            handsInstance = new Hands({
                locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
            });
            handsInstance.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });
            handsInstance.onResults((results) => {
                domainCtx.clearRect(0, 0, domainCanvas.width, domainCanvas.height);
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    drawConnectors(domainCtx, lm, HAND_CONNECTIONS, { color: '#00d4ff', lineWidth: 2 });
                    drawLandmarks(domainCtx, lm, { color: '#ffffff', radius: 4, circleColor: 'rgba(0, 200, 255, 0.6)' });

                    const detected = detectHandsign(lm);
                    if (detected) {
                        const d = DOMAINS[detected];
                        hintEl.innerHTML = `🔥 ${d.name}`;
                        hintEl.style.color = d.color;
                        hintEl.style.borderColor = d.color + '44';
                        if (detected !== lastGesture) {
                            lastGesture = detected;
                            triggerDomain(detected);
                        }
                    } else {
                        hintEl.innerHTML = '✋ Angkat tanganmu';
                        hintEl.style.color = 'rgba(255,255,255,0.5)';
                        hintEl.style.borderColor = 'rgba(255,255,255,0.05)';
                        lastGesture = 'none';
                    }
                    statusText.innerHTML = `👋 Tangan terdeteksi`;
                } else {
                    hintEl.innerHTML = '✋ Angkat tanganmu';
                    hintEl.style.color = 'rgba(255,255,255,0.3)';
                    statusText.innerHTML = '⏳ Tidak ada tangan';
                    lastGesture = 'none';
                }
            });
        }

        function startDomainCamera() {
            if (domainRunning) return;
            stopFaceCamera();
            initHands();
            if (!domainCamera) {
                domainCamera = new Camera(domainVideo, {
                    onFrame: async () => {
                        await handsInstance.send({ image: domainVideo });
                    },
                    width: 640,
                    height: 480
                });
            }
            domainCamera.start();
            domainRunning = true;
        }

        function stopDomainCamera() {
            if (domainCamera) {
                try { domainCamera.stop(); } catch (e) {}
                domainRunning = false;
                domainCamera = null;
            }
            if (domainVideo && domainVideo.srcObject) {
                domainVideo.srcObject.getTracks().forEach(t => t.stop());
                domainVideo.srcObject = null;
            }
        }

        // ================================================================
        // 3. FACE CHECK (dengan start/stop)
        // ================================================================
        let faceMeshInstance = null;
        let faceCameraInstance = null;
        let faceInitialized = false;

        const rankMap = [
            { min: 0, max: 20, label: 'Subhuman', emoji: '🧟', desc: 'Banyak yang perlu diperbaiki. Mulai dari gaya hidup dan perawatan diri.' },
            { min: 21, max: 40, label: 'Normie', emoji: '😐', desc: 'Rata-rata. Tidak buruk, tapi belum standout.' },
            { min: 41, max: 60, label: 'Chadlite', emoji: '💪', desc: 'Di atas rata-rata! Proporsi wajah cukup baik.' },
            { min: 61, max: 80, label: 'Chad', emoji: '🔥', desc: 'Wajah tegas, simetris, maskulin/ feminin menarik.' },
            { min: 81, max: 100, label: 'True Adam', emoji: '👑', desc: 'Puncak estetika! Hampir sempurna secara proporsi.' }
        ];

        const faceVideoEl = document.getElementById('face-video');
        const faceCanvasEl = document.getElementById('face-canvas');
        const faceCtx = faceCanvasEl.getContext('2d');
        const faceStatusEl = document.getElementById('face-status');
        const faceResultEl = document.getElementById('face-result');
        const faceRankEl = document.getElementById('faceRank');
        const faceDescEl = document.getElementById('faceDesc');
        const faceScoreEl = document.getElementById('faceScore');
        const faceDetailEl = document.getElementById('faceDetail');

        function analyzeFace(landmarks) {
            const w = faceCanvasEl.width,
                h = faceCanvasEl.height;
            const lm = landmarks;

            function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

            function distX(a, b) { return Math.abs(a.x - b.x); }

            function distY(a, b) { return Math.abs(a.y - b.y); }

            const faceWidth = dist(lm[234], lm[454]);
            const faceHeight = dist(lm[10], lm[152]);
            const ratioWH = faceWidth / faceHeight;

            const eyeDistance = dist(lm[33], lm[263]);
            const eyeRatio = eyeDistance / faceWidth;

            const midX = (lm[234].x + lm[454].x) / 2;
            const jawLeft = lm[199].x;
            const jawRight = lm[419].x;
            const jawAsymmetry = Math.abs((jawLeft - midX) - (midX - jawRight)) / faceWidth;

            const noseTip = lm[1];
            const eyeCenterY = (lm[33].y + lm[263].y) / 2;
            const noseHeight = distY(noseTip, lm[10]);
            const chinHeight = distY(lm[152], lm[14]);
            const lowerFaceRatio = chinHeight / faceHeight;

            let score = 50;

            if (ratioWH > 0.7 && ratioWH < 0.8) score += 15;
            else if (ratioWH > 0.65 && ratioWH < 0.85) score += 8;
            else score -= 10;

            if (eyeRatio > 0.42 && eyeRatio < 0.52) score += 15;
            else if (eyeRatio > 0.38 && eyeRatio < 0.56) score += 8;
            else score -= 10;

            if (jawAsymmetry < 0.03) score += 15;
            else if (jawAsymmetry < 0.06) score += 8;
            else score -= 10;

            if (lowerFaceRatio > 0.40 && lowerFaceRatio < 0.58) score += 10;
            else if (lowerFaceRatio > 0.35 && lowerFaceRatio < 0.62) score += 5;
            else score -= 8;

            const eyeToNoseRatio = distY(noseTip, lm[33]) / faceHeight;
            if (eyeToNoseRatio > 0.28 && eyeToNoseRatio < 0.42) score += 10;
            else if (eyeToNoseRatio > 0.24 && eyeToNoseRatio < 0.46) score += 5;
            else score -= 6;

            score = Math.max(0, Math.min(100, score));

            let rank = rankMap.find(r => score >= r.min && score <= r.max);
            if (!rank) rank = rankMap[0];

            const detail = `
                Rasio W/H: ${ratioWH.toFixed(2)} (ideal 0.72-0.78)<br>
                Jarak Mata: ${eyeRatio.toFixed(2)} (ideal 0.44-0.50)<br>
                Simetri Rahang: ${(jawAsymmetry * 100).toFixed(1)}% (semakin kecil semakin baik)<br>
                Proporsi Bawah: ${lowerFaceRatio.toFixed(2)} (ideal 0.45-0.55)
            `;

            return { score, rank, detail };
        }

        function initFaceDetection() {
            if (faceInitialized) return;
            faceInitialized = true;

            faceMeshInstance = new FaceMesh({
                locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
            });
            faceMeshInstance.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });
            faceMeshInstance.onResults((results) => {
                faceCtx.clearRect(0, 0, faceCanvasEl.width, faceCanvasEl.height);
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const landmarks = results.multiFaceLandmarks[0];
                    for (const lm of landmarks) {
                        const x = lm.x * faceCanvasEl.width;
                        const y = lm.y * faceCanvasEl.height;
                        faceCtx.beginPath();
                        faceCtx.arc(x, y, 2, 0, 2 * Math.PI);
                        faceCtx.fillStyle = 'rgba(0, 200, 255, 0.6)';
                        faceCtx.fill();
                    }
                    const result = analyzeFace(landmarks);
                    const rank = result.rank;
                    const score = result.score;
                    faceResultEl.classList.add('show');
                    faceRankEl.textContent = `${rank.emoji} ${rank.label}`;
                    faceRankEl.style.color =
                        score >= 80 ? '#f1c40f' :
                        score >= 60 ? '#e67e22' :
                        score >= 40 ? '#3498db' :
                        score >= 20 ? '#95a5a6' : '#e74c3c';
                    faceDescEl.textContent = rank.desc;
                    faceScoreEl.textContent = `Skor: ${Math.round(score)} / 100`;
                    faceDetailEl.innerHTML = result.detail;
                    faceStatusEl.textContent = '✅ Wajah terdeteksi';
                } else {
                    faceResultEl.classList.remove('show');
                    faceStatusEl.textContent = '⏳ Tidak ada wajah';
                }
            });
        }

        function startFaceCamera() {
            if (faceRunning) return;
            stopDomainCamera();
            initFaceDetection();
            if (!faceCameraInstance) {
                faceCameraInstance = new Camera(faceVideoEl, {
                    onFrame: async () => {
                        await faceMeshInstance.send({ image: faceVideoEl });
                    },
                    width: 640,
                    height: 480
                });
            }
            faceCameraInstance.start();
            faceRunning = true;
        }

        function stopFaceCamera() {
            if (faceCameraInstance) {
                try { faceCameraInstance.stop(); } catch (e) {}
                faceRunning = false;
                faceCameraInstance = null;
            }
            if (faceVideoEl && faceVideoEl.srcObject) {
                faceVideoEl.srcObject.getTracks().forEach(t => t.stop());
                faceVideoEl.srcObject = null;
            }
        }

        // ================================================================
        // 4. INISIALISASI AWAL (start domain karena tab aktif)
        // ================================================================
        // Fallback MediaPipe drawing jika belum terdefinisi
        if (typeof drawConnectors === 'undefined') {
            window.drawConnectors = function(ctx, lm, conns, style) {
                ctx.strokeStyle = style.color || '#00d4ff';
                ctx.lineWidth = style.lineWidth || 2;
                for (const c of conns) {
                    const a = lm[c[0]],
                        b = lm[c[1]];
                    if (a && b) {
                        ctx.beginPath();
                        ctx.moveTo(a.x * ctx.canvas.width, a.y * ctx.canvas.height);
                        ctx.lineTo(b.x * ctx.canvas.width, b.y * ctx.canvas.height);
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof drawLandmarks === 'undefined') {
            window.drawLandmarks = function(ctx, lm, style) {
                const r = style.radius || 4;
                for (const p of lm) {
                    ctx.beginPath();
                    ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r, 0, 2 * Math.PI);
                    ctx.fillStyle = style.color || '#fff';
                    ctx.fill();
                    if (style.circleColor) {
                        ctx.beginPath();
                        ctx.arc(p.x * ctx.canvas.width, p.y * ctx.canvas.height, r * 1.8, 0, 2 * Math.PI);
                        ctx.strokeStyle = style.circleColor;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            };
        }
        if (typeof HAND_CONNECTIONS === 'undefined') {
            window.HAND_CONNECTIONS = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];
        }

        // Mulai dengan domain (tab aktif)
        startDomainCamera();

        console.log('✅ Web siap! Kamera hanya aktif di tab yang dipilih.');
        console.log('   Handsign: Gojo, Sukuna, Megumi');
        console.log('   Face Check: deteksi wajah realtime.');
    </script>
